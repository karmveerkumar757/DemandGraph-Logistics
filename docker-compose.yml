services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    environment:
      LOGISTICS_API_HOST: 0.0.0.0
      LOGISTICS_API_PORT: 8000
      LOGISTICS_DATABASE_URL: sqlite:///data/logistics.db
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    command: streamlit run apps/dashboard/Home.py --server.port 8501 --server.address 0.0.0.0
    environment:
      LOGISTICS_API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - .:/app

